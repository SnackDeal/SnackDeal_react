name: React Frontend Build and Deploy

on:
  pull_request:
    branches:
      - main
      - dev
    types:
      - closed

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/snackdeal/snackdeal_frontend

jobs:
  build-and-push:
    if: github.event.pull_request.merged == true
    name: 도커 이미지 빌드 & 푸시
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 세팅
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: React 빌드
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CHATBOT_API_URL: ${{ secrets.VITE_CHATBOT_API_URL }}
        run: npm run build

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Vite API secrets 확인
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_CHATBOT_API_URL: ${{ secrets.VITE_CHATBOT_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL secret이 비어있음. Settings → Secrets and variables → Actions 확인 필요"
            exit 1
          fi
          if [[ "$VITE_API_URL" != https://* ]]; then
            echo "::error::VITE_API_URL must start with https://. Current value would cause mixed content."
            exit 1
          fi
          if [ -z "$VITE_CHATBOT_API_URL" ]; then
            echo "::error::VITE_CHATBOT_API_URL secret이 비어있음. Settings → Secrets and variables → Actions 확인 필요"
            exit 1
          fi
          if [[ "$VITE_CHATBOT_API_URL" != https://* ]]; then
            echo "::error::VITE_CHATBOT_API_URL must start with https://. Current value would cause mixed content."
            exit 1
          fi
          echo "VITE_API_URL length: ${#VITE_API_URL}"
          echo "VITE_CHATBOT_API_URL length: ${#VITE_CHATBOT_API_URL}"

      - name: 빌드 & 푸시 (Nginx 포함)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_CHATBOT_API_URL=${{ secrets.VITE_CHATBOT_API_URL }}

  deploy:
    name: EC2 배포
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: 스크립트 권한 부여
        run: chmod +x /home/ubuntu/snackdeal/deploy-frontend.sh

      - name: GHCR 로그인
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 프론트엔드 배포 실행
        run: /home/ubuntu/snackdeal/deploy-frontend.sh
